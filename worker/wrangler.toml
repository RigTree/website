name = "rigtree-oauth"
main = "oauth-proxy.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://rigtree.pages.dev"

# Create the KV namespace, then paste the id here:
#   wrangler kv:namespace create SESSIONS
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
